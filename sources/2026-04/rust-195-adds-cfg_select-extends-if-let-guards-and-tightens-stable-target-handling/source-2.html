            <div class='post' itemprop='text'>
              <p>The 1.95.0 pre-release is ready for testing. The release is scheduled for
April 16. <a href="https://dev-doc.rust-lang.org/1.95.0/releases.html">Release notes can be found here.</a></p>
<p>You can try it out locally by running:</p>
<pre><code class="lang-plaintext">RUSTUP_DIST_SERVER=https://dev-static.rust-lang.org rustup update stable
</code></pre>
<p>The index is <a href="https://dev-static.rust-lang.org/dist/2026-04-13/index.html">https://dev-static.rust-lang.org/dist/2026-04-13/index.html</a>.</p>
<p>The release team is also thinking about changes to our pre-release process:
we'd love your feedback <a href="https://github.com/rust-lang/release-team/issues/16">on this GitHub issue</a>.</p>
