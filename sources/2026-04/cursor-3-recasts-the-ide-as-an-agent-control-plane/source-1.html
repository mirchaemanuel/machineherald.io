<script type="application/ld+json">{"@context":"http://schema.org","@type":"QAPage","name":"Cursor 3: Agents Window","mainEntity":{"@type":"Question","name":"Cursor 3: Agents Window","text":"New in Cursor! · <a href=\"https://cursor.com/changelog/3-0\">Full changelog<\/a> · <a href=\"https://forum.cursor.com/t/cursor-3-0-is-here/156506/3\">Main announcement<\/a> · <a href=\"https://cursor.com/blog/cursor-3\">Blog<\/a>\n\nWe’re excited to introduce the Agents Window, a unified workspace for building software with agents, built from the ground up.\n\nRead the full blog post: <a href=\"https://cursor.com/blog/cursor-3\">Meet the New Cursor<\/a>\n\nHow it works\n\nThe Agents Window is a new interface centered &hellip;","upvoteCount":3,"answerCount":19,"datePublished":"2026-04-02T18:24:38.161Z","author":{"@type":"Person","name":"Colin","url":"https://forum.cursor.com/u/Colin"},"suggestedAnswer":[{"@type":"Answer","text":"How do we get the video recordings? Is this from a cloud agent? I am starting a new web app project and I want to lean in on the agentic work flow as much as possible to try it out, but I am not sure how to do it (what settings to turn on, what modes, what kind of agents to use, use worktrees or no,&hellip;","upvoteCount":0,"datePublished":"2026-04-02T18:54:27.294Z","url":"https://forum.cursor.com/t/cursor-3-agents-window/156509/5","author":{"@type":"Person","name":"whe","url":"https://forum.cursor.com/u/whe"}},{"@type":"Answer","text":"I can do a bug report, but, has anyone gotten this to work? Any version over 3 should have it? What is the actual command? Here it says Agents Window, in the docs it says View: New Agents Window… I don’t see any of those options. I am on enterprise but enabled the option for everyone, in the enterpr&hellip;","upvoteCount":1,"datePublished":"2026-04-02T19:28:20.737Z","url":"https://forum.cursor.com/t/cursor-3-agents-window/156509/6","author":{"@type":"Person","name":"kbrouder","url":"https://forum.cursor.com/u/kbrouder"}},{"@type":"Answer","text":"Hi <a class=\"mention\" href=\"/u/kevinn\">@kevinn<\/a> , I’ve updated to Cursor 3.0.4, but I still see the same VSCode style interface. I also don’t see any of the various options this announcement has mentioned to try it out:\n\nCmd+Shift+P → Agents Window\n\nFile → New Agent Window\n\nCmd+Shift+P → Open Agents Window\n\nDo I need to re-download Curs&hellip;","upvoteCount":0,"datePublished":"2026-04-02T22:25:06.535Z","url":"https://forum.cursor.com/t/cursor-3-agents-window/156509/7","author":{"@type":"Person","name":"Nicholas_Ebert","url":"https://forum.cursor.com/u/Nicholas_Ebert"}},{"@type":"Answer","text":"Hi <a class=\"mention\" href=\"/u/nicholas_ebert\">@Nicholas_Ebert<\/a> ! Nope, you don’t have to re-download, the native updater bundled with the application, i.e. Cursor → Check for Updates on Mac should be totally fine.\n\nYou don’t see the New Agents Window under File?\n\n<a class=\"lightbox\" href=\"https://us1.discourse-cdn.com/cursor1/original/3X/6/b/6b2dec6a967721663d973381eec7cc9fe129d05e.png\" data-download-href=\"/uploads/short-url/fi9tL46MSoKeDZr6FLCzzYocKQK.png?dl=1\" title=\"Screenshot 2026-04-02 at 3.39.57 PM\">[Screenshot 2026-04-02 at 3.39.57 PM]<\/a>\n\nNote that if you already have an Agents &hellip;","upvoteCount":1,"datePublished":"2026-04-02T22:40:54.047Z","url":"https://forum.cursor.com/t/cursor-3-agents-window/156509/8","author":{"@type":"Person","name":"kevinn","url":"https://forum.cursor.com/u/kevinn"}},{"@type":"Answer","text":"Also, I wanted to mention that Cursor 3 doesn’t replace the existing VSCode-style interface; it is another option that exists in parallel. You can use the new Cursor 3 interface for some tasks and the existing IDE interface for other tasks! I use both personally.","upvoteCount":2,"datePublished":"2026-04-02T22:43:32.644Z","url":"https://forum.cursor.com/t/cursor-3-agents-window/156509/9","author":{"@type":"Person","name":"kevinn","url":"https://forum.cursor.com/u/kevinn"}},{"@type":"Answer","text":"I love the agents window, but I’m sad that I can’t theme it with VS Code themes or at least have it use the default Cursor theme from before.","upvoteCount":0,"datePublished":"2026-04-02T22:52:02.899Z","url":"https://forum.cursor.com/t/cursor-3-agents-window/156509/10","author":{"@type":"Person","name":"Brent_Phillips","url":"https://forum.cursor.com/u/Brent_Phillips"}},{"@type":"Answer","text":"Hi <a class=\"mention\" href=\"/u/kevinn\">@kevinn<\/a> , thanks for the quick response. That’s so strange, I don’t see that option.\n\n<a class=\"lightbox\" href=\"https://us1.discourse-cdn.com/cursor1/original/3X/d/2/d201be8ff6ff55b43f00eeab7afbd0e534682b1c.png\" data-download-href=\"/uploads/short-url/tXO0nwDfgl5RVL3kXXJVHxnp4Go.png?dl=1\" title=\"Screenshot 2026-04-02 at 3.55.09 PM\" rel=\"noopener nofollow ugc\">[Screenshot 2026-04-02 at 3.55.09 PM]<\/a>\n\n<a class=\"lightbox\" href=\"https://us1.discourse-cdn.com/cursor1/original/3X/5/a/5a4c04f3de2b21eaf3703077ab3ba3f8a2b16a3d.png\" data-download-href=\"/uploads/short-url/cSNQgDDO8AgKnHiMpz2Rj579ZmJ.png?dl=1\" title=\"Screenshot 2026-04-02 at 3.54.24 PM\" rel=\"noopener nofollow ugc\">[Screenshot 2026-04-02 at 3.54.24 PM]<\/a>\n\nHave tried restarting my Cursor, restarting my Mac.","upvoteCount":1,"datePublished":"2026-04-02T22:55:30.271Z","url":"https://forum.cursor.com/t/cursor-3-agents-window/156509/11","author":{"@type":"Person","name":"Nicholas_Ebert","url":"https://forum.cursor.com/u/Nicholas_Ebert"}},{"@type":"Answer","text":"I’m mystified about how to get this working.\n\nUpgraded to Cursor 3\n\nEnsured Agents Window is enabled in Enterprise Settings\n\nRestarted Cursor\n\nDespite that, no cmd+shift+p → Open (Agents|Editor) Window and no multi-workspace view. Instructions for enablement could really use some work.\n\nI’ve seen a f&hellip;","upvoteCount":1,"datePublished":"2026-04-02T23:21:13.628Z","url":"https://forum.cursor.com/t/cursor-3-agents-window/156509/12","author":{"@type":"Person","name":"Geoffrey_Hichborn","url":"https://forum.cursor.com/u/Geoffrey_Hichborn"}},{"@type":"Answer","text":"I see your admin has enabled access to Cursor 3.0 and the agent view by default, right now I’m not sure exactly why you can’t see it. I might need to follow up tomorrow.","upvoteCount":0,"datePublished":"2026-04-02T23:39:34.390Z","url":"https://forum.cursor.com/t/cursor-3-agents-window/156509/14","author":{"@type":"Person","name":"kevinn","url":"https://forum.cursor.com/u/kevinn"}},{"@type":"Answer","text":"I managed to get it working, key was to sign out, then in the top theres a button to switch to the new agent view, then you can sign back in.. I haven’t closed it yet though. Its been a bit flaky, not sure if the issues I am hitting are because of the way I got it to open though… I’m sure the cursor&hellip;","upvoteCount":0,"datePublished":"2026-04-03T00:50:06.421Z","url":"https://forum.cursor.com/t/cursor-3-agents-window/156509/15","author":{"@type":"Person","name":"kbrouder","url":"https://forum.cursor.com/u/kbrouder"}},{"@type":"Answer","text":"This is fire, been waiting for this forever, big thanks Cursor team!","upvoteCount":1,"datePublished":"2026-04-03T02:09:25.030Z","url":"https://forum.cursor.com/t/cursor-3-agents-window/156509/17","author":{"@type":"Person","name":"user1488_88","url":"https://forum.cursor.com/u/user1488_88"}},{"@type":"Answer","text":"Will the IDE being shut down in the future?","upvoteCount":0,"datePublished":"2026-04-03T02:11:06.084Z","url":"https://forum.cursor.com/t/cursor-3-agents-window/156509/18","author":{"@type":"Person","name":"Duong_Do","url":"https://forum.cursor.com/u/Duong_Do"}},{"@type":"Answer","text":"Doesn’t support wsl extension.  :slightly_frowning_face:","upvoteCount":2,"datePublished":"2026-04-03T04:51:08.139Z","url":"https://forum.cursor.com/t/cursor-3-agents-window/156509/19","author":{"@type":"Person","name":"Hriteek_Bista","url":"https://forum.cursor.com/u/Hriteek_Bista"}},{"@type":"Answer","text":"I also can’t see this option in Ubuntu 24.04.\n\nVersion: 3.0.9\n\nVSCode Version: 1.105.1\n\nCommit: 93e276db8a03af947eafb2d10241e2de17806c20\n\nDate: 2026-04-03T02:06:46.446Z\n\nLayout: editor\n\nBuild Type: Stable\n\nRelease Track: Default\n\nElectron: 39.8.1\n\nChromium: 142.0.7444.265\n\nNode.js: 22.22.1\n\nV8: 14.2&hellip;","upvoteCount":0,"datePublished":"2026-04-03T07:14:54.265Z","url":"https://forum.cursor.com/t/cursor-3-agents-window/156509/20","author":{"@type":"Person","name":"DimitrisT","url":"https://forum.cursor.com/u/DimitrisT"}},{"@type":"Answer","text":"When using OTP-based SSH, do I need to re-authenticate in the Agent window each time I switch between workspaces?\n\nIn Cursor 2 or VS Code I can open multiple windows for different workspaces, but with the Agent window it feels like I’m expected to use a single window. Is that correct?","upvoteCount":0,"datePublished":"2026-04-03T07:35:44.478Z","url":"https://forum.cursor.com/t/cursor-3-agents-window/156509/21","author":{"@type":"Person","name":"fan.zhang","url":"https://forum.cursor.com/u/fan.zhang"}},{"@type":"Answer","text":"This is a good thing BTW, thanks to the team. Forcing user to new UI is not a good idea.","upvoteCount":1,"datePublished":"2026-04-03T09:06:59.931Z","url":"https://forum.cursor.com/t/cursor-3-agents-window/156509/22","author":{"@type":"Person","name":"leoing","url":"https://forum.cursor.com/u/leoing"}},{"@type":"Answer","text":"In another thread someone mentioned logging out and in helps.","upvoteCount":0,"datePublished":"2026-04-03T09:08:19.208Z","url":"https://forum.cursor.com/t/cursor-3-agents-window/156509/23","author":{"@type":"Person","name":"leoing","url":"https://forum.cursor.com/u/leoing"}},{"@type":"Answer","text":"code-workspace does not display","upvoteCount":0,"datePublished":"2026-04-03T09:23:28.177Z","url":"https://forum.cursor.com/t/cursor-3-agents-window/156509/24","author":{"@type":"Person","name":"Allenleefun","url":"https://forum.cursor.com/u/Allenleefun"}},{"@type":"Answer","text":"This makes Cursor functionally useless.\n\nThe tasks I work on have a 60-90% failure rate for first try with Composer 2.  The ability to interactively edit code is a non-negotiable. Cursor was good precisely because it allowed you to quickly shift granularity from ‘micromanaging an agent’ ‘to letting &hellip;","upvoteCount":6,"datePublished":"2026-04-03T16:31:26.387Z","url":"https://forum.cursor.com/t/cursor-3-agents-window/156509/25","author":{"@type":"Person","name":"nicholasbailey","url":"https://forum.cursor.com/u/nicholasbailey"}}]}}</script>

        <div class="hidden" id="data-preloaded" data-preloaded="{&quot;topic_156509&quot;:&quot;{\&quot;post_stream\&quot;:{\&quot;posts\&quot;:[{\&quot;id\&quot;:369682,\&quot;name\&quot;:\&quot;Colin\&quot;,\&quot;username\&quot;:\&quot;Colin\&quot;,\&quot;avatar_template\&quot;:\&quot;/user_avatar/forum.cursor.com/colin/{size}/90452_2.png\&quot;,\&quot;created_at\&quot;:\&quot;2026-04-02T18:24:38.161Z\&quot;,\&quot;cooked\&quot;:\&quot;\\u003cp\\u003e\\u003cem\\u003eNew in Cursor! · \\u003ca href=\\\&quot;https://cursor.com/changelog/3-0\\\&quot;\\u003eFull changelog\\u003c/a\\u003e · \\u003cem\\u003e\\u003ca href=\\\&quot;https://forum.cursor.com/t/cursor-3-0-is-here/156506/3\\\&quot;\\u003eMain announcement\\u003c/a\\u003e · \\u003ca href=\\\&quot;https://cursor.com/blog/cursor-3\\\&quot;\\u003eBlog\\u003c/a\\u003e\\u003c/em\\u003e\\u003c/em\\u003e\\u003c/p\\u003e\\n\\u003cp\\u003eWe’re excited to introduce the \\u003cstrong\\u003eAgents Window\\u003c/strong\\u003e, a unified workspace for building software with agents, built from the ground up.\\u003c/p\\u003e\\n\\u003cp\\u003e\\u003c/p\\u003e\\u003cdiv class=\\\&quot;video-placeholder-container\\\&quot; data-video-src=\\\&quot;https://us1.discourse-cdn.com/cursor1/original/3X/8/8/88ec03733c1f54aaebedff71f6eafbf4b3e87df3.mp4\\\&quot; data-thumbnail-src=\\\&quot;https://us1.discourse-cdn.com/cursor1/original/3X/7/e/7e244905bceed2fed7d0c2639f2d32d59b0a92da.jpeg\\\&quot; data-video-base62-sha1=\\\&quot;jxgAJEZ1yRTWeXkuQWFxGilBbR9.mp4\\\&quot;\\u003e\\n  \\u003c/div\\u003e\\u003cp\\u003e\\u003c/p\\u003e\\n\\u003cp\\u003eRead the full blog post: \\u003ca href=\\\&quot;https://cursor.com/blog/cursor-3\\\&quot;\\u003eMeet the New Cursor\\u003c/a\\u003e\\u003c/p\\u003e\\n\\u003cp\\u003e\\u003cstrong\\u003eHow it works\\u003c/strong\\u003e\\u003c/p\\u003e\\n\\u003cp\\u003eThe Agents Window is a new interface centered around agents. It’s inherently multi-workspace, letting you and your agents work across different repos from one place.\\u003c/p\\u003e\\n\\u003cp\\u003eYou can run as many agents as you want: locally, in the cloud, in worktrees, or on remote SSH, and they all appear in the sidebar, including ones kicked off from mobile, web, desktop, Slack, GitHub, and Linear. Cloud agents produce demos and screenshots of their work for you to verify.\\u003c/p\\u003e\\n\\u003cp\\u003eMoving agents between environments is fast: shift a session from cloud to local when you want to make edits and test on your own machine, or from local to cloud to keep it running while you’re offline or moving on to the next task.\\u003c/p\\u003e\\n\\u003cp\\u003eThe new interface also features a simpler diffs view for faster review, and the ability to stage, commit, and manage PRs without leaving the window.\\u003c/p\\u003e\\n\\u003cp\\u003eTo try it, upgrade Cursor and type \\u003ccode\\u003eCmd+Shift+P → Agents Window\\u003c/code\\u003e. You can switch back to the IDE anytime, or have both open simultaneously.\\u003c/p\\u003e\\n\\u003cp\\u003eLearn more: \\u003ca href=\\\&quot;https://cursor.com/docs/agent/agents-window\\\&quot;\\u003eAgents Window documentation\\u003c/a\\u003e\\u003c/p\\u003e\\n\\u003cp\\u003e\\u003cstrong\\u003eWe’d love your feedback!\\u003c/strong\\u003e\\u003c/p\\u003e\\n\\u003cul\\u003e\\n\\u003cli\\u003eHow does the Agents Window change the way you work with multiple agents?\\u003c/li\\u003e\\n\\u003cli\\u003eHow is the local ↔ cloud handoff working for your workflow?\\u003c/li\\u003e\\n\\u003cli\\u003eWhat kinds of multi-agent workflows are you running across environments?\\u003c/li\\u003e\\n\\u003c/ul\\u003e\\n\\u003cp\\u003eIf you’ve found a bug, please post it in \\u003ca href=\\\&quot;https://forum.cursor.com/c/support/bug-report/6\\\&quot;\\u003eBug Reports\\u003c/a\\u003e instead, so we can track and address it properly, but also feel free to drop a link to it in this thread for visibility.\\u003c/p\\u003e\&quot;,\&quot;post_number\&quot;:1,\&quot;post_type\&quot;:1,\&               <p><em>New in Cursor! · <a href="https://cursor.com/changelog/3-0">Full changelog</a> · <em><a href="https://forum.cursor.com/t/cursor-3-0-is-here/156506/3">Main announcement</a> · <a href="https://cursor.com/blog/cursor-3">Blog</a></em></em></p>
<p>We’re excited to introduce the <strong>Agents Window</strong>, a unified workspace for building software with agents, built from the ground up.</p>
<p></p><div class="video-placeholder-container" data-video-src="https://us1.discourse-cdn.com/cursor1/original/3X/8/8/88ec03733c1f54aaebedff71f6eafbf4b3e87df3.mp4" data-thumbnail-src="https://us1.discourse-cdn.com/cursor1/original/3X/7/e/7e244905bceed2fed7d0c2639f2d32d59b0a92da.jpeg" data-video-base62-sha1="jxgAJEZ1yRTWeXkuQWFxGilBbR9.mp4">
  </div><p></p>
<p>Read the full blog post: <a href="https://cursor.com/blog/cursor-3">Meet the New Cursor</a></p>
<p><strong>How it works</strong></p>
<p>The Agents Window is a new interface centered around agents. It’s inherently multi-workspace, letting you and your agents work across different repos from one place.</p>
<p>You can run as many agents as you want: locally, in the cloud, in worktrees, or on remote SSH, and they all appear in the sidebar, including ones kicked off from mobile, web, desktop, Slack, GitHub, and Linear. Cloud agents produce demos and screenshots of their work for you to verify.</p>
<p>Moving agents between environments is fast: shift a session from cloud to local when you want to make edits and test on your own machine, or from local to cloud to keep it running while you’re offline or moving on to the next task.</p>
<p>The new interface also features a simpler diffs view for faster review, and the ability to stage, commit, and manage PRs without leaving the window.</p>
<p>To try it, upgrade Cursor and type <code>Cmd+Shift+P → Agents Window</code>. You can switch back to the IDE anytime, or have both open simultaneously.</p>
<p>Learn more: <a href="https://cursor.com/docs/agent/agents-window">Agents Window documentation</a></p>
<p><strong>We’d love your feedback!</strong></p>
<ul>
<li>How does the Agents Window change the way you work with multiple agents?</li>
<li>How is the local ↔ cloud handoff working for your workflow?</li>
<li>What kinds of multi-agent workflows are you running across environments?</li>
</ul>
<p>If you’ve found a bug, please post it in <a href="https://forum.cursor.com/c/support/bug-report/6">Bug Reports</a> instead, so we can track and address it properly, but also feel free to drop a link to it in this thread for visibility.</p>

              <p>This makes Cursor functionally useless.</p>
<p>The tasks I work on have a 60-90% failure rate for first try with Composer 2.  The ability to interactively edit code is a non-negotiable. Cursor was good precisely because it allowed you to quickly shift granularity from ‘micromanaging an agent’ ‘to letting something run on its own’ depending on need.</p>
<p>This takes that away. I can only sit at one granularity level.</p>
