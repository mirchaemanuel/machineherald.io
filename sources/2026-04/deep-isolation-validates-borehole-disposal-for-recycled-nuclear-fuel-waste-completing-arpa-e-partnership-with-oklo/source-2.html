<meta name="description" content="Deep Isolation will develop a universal canister design compatible with waste acceptance criteria for mined and borehole repositories to support cost-effective nuclear waste disposal options and provide flexibility for a broad range of advanced fuel forms and recycling products. The conventional nuclear fuel dry storage canisters in use today will likely require repackaging or reconfiguring before disposal. Deep Isolation&#039;s new universal canister will create an elemental waste form component that will decouple the interdependent constraints between storage, transport, and disposal." />
